name: Integration Test
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build (linux_amd64) + Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build extension
        run: make release

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install duckdb==1.4.4 pytest

      - run: pytest test/python/ -v -s
        env:
          DELTA_EXPORT_EXTENSION_PATH: build/release/extension/delta_export/delta_export.duckdb_extension
