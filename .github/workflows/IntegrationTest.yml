name: Integration Test
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (linux_amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build extension
        run: make release

      - uses: actions/upload-artifact@v4
        with:
          name: delta_export-linux_amd64
          path: build/release/extension/delta_export/delta_export.duckdb_extension

  python-tests:
    name: Python tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: delta_export-linux_amd64
          path: ./artifact

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install duckdb==1.4.4 pytest

      - run: pytest test/python/ -v -s
        env:
          DELTA_EXPORT_EXTENSION_PATH: ./artifact/delta_export.duckdb_extension
